app = "hellodriver-main"
primary_region = "jnb"

[build]
builder = "docker"

[env]
NODE_ENV = "production"
PORT = "3000"
LOG_LEVEL = "info"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1

[[http_service.ports]]
port = 80
handlers = ["http"]

[[http_service.ports]]
port = 443
handlers = ["tls", "http"]

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
timeout = "5s"
type = "http"
method = "GET"
path = "/health"
protocol = "http"

[vm]
cpu_kind = "shared"
cpus = 1
memory_mb = 256
