app = "hellodriver-api"
primary_region = "jnb"

[build]
builder = "docker"

[env]
NODE_ENV = "production"
PORT = "3000"
LOG_LEVEL = "info"

[[services]]
protocol = "tcp"
internal_port = 3000
processes = ["app"]

[services.ports]
port = 80
handlers = ["http"]

[services.ports]
port = 443
handlers = ["tls", "http"]

[services.tcp_checks]
interval = 10000
timeout = 5000
grace_period = "5s"

[[services.ports]]
port = 80

[[services.ports]]
port = 443

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[http_service.checks]]
grace_period = "10s"
interval = 30000
timeout = 5000
type = "http"
method = "GET"
path = "/health"
protocol = "http"
